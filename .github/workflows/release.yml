# .github/workflows/release.yml
# Triggered when a version tag is pushed (e.g. v5.5.0).
# Builds all 37 Go binaries for Linux/macOS/Windows,
# runs the full Python test suite, then creates a GitHub Release
# with all binaries attached as downloadable assets.
#
# How to trigger:
#   git tag -a v5.5.0 -m "Release v5.5.0"
#   git push origin v5.5.0

name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  GO_VERSION: "1.22"

jobs:
  # ── 1. Run full test suite first ────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install & test
        run: |
          pip install -e ".[dev]"
          pytest tests/ -q --tb=short --no-header -x

  # ── 2. Build binaries for all platforms ─────────────────
  build:
    name: Build · ${{ matrix.goos }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            suffix: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            suffix: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            suffix: "-arm64"
            archive: tar.gz
          - goos: windows
            goarch: amd64
            suffix: ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build all binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINS=(
            glitchrace glitchscan glitchfuzz glitchfuzz2 glitchdns glitchtls glitchproxy
            glitchsmb glitchssh glitchrdp glitchldap glitchsnmp glitchftp glitchvnc glitchwmi
            glitchagent glitchd glitchbrute glitchkerberos glitchdesync glitchhttp2
            glitchrelay glitchids glitchexploit glitchpcap glitchwatcher glitchfuzz3
            glitchquic glitchimplant glitchpivot
            glitchevade glitchcloak glitchsupply glitchcloud glitchiot glitchai glitchorchestrator
          )
          OUTDIR="dist/${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "$OUTDIR"

          for bin in "${BINS[@]}"; do
            if [ -d "$bin" ]; then
              OUT="$OUTDIR/${bin}${{ matrix.suffix }}"
              go build -ldflags="-s -w" -o "$OUT" "./$bin/" && echo "✓ $bin" || echo "✗ $bin"
            fi
          done
          ls -lh "$OUTDIR"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd dist
          tar -czf "glitchicons-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            "${{ matrix.goos }}-${{ matrix.goarch }}/"
          ls -lh *.tar.gz

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          cd dist
          zip -r "glitchicons-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip" \
            "${{ matrix.goos }}-${{ matrix.goarch }}/"
          ls -lh *.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/glitchicons-*.*
          retention-days: 1

  # ── 3. Create GitHub Release ─────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: release-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          PREV=$(git tag --sort=-version:refname | grep -v "$TAG" | head -1)
          echo "## $TAG" > notes.md
          echo "" >> notes.md
          if [ -n "$PREV" ]; then
            echo "### Changes since $PREV" >> notes.md
            git log --oneline "$PREV..$TAG" | sed 's/^/- /' >> notes.md
          fi
          echo "" >> notes.md
          cat >> notes.md << 'EOF'
          ### Download
          | Platform | File |
          |----------|------|
          | Linux x86-64 | `glitchicons-VERSION-linux-amd64.tar.gz` |
          | Linux ARM64 | `glitchicons-VERSION-linux-arm64.tar.gz` |
          | macOS x86-64 | `glitchicons-VERSION-darwin-amd64.tar.gz` |
          | macOS Apple Silicon | `glitchicons-VERSION-darwin-arm64.tar.gz` |
          | Windows x86-64 | `glitchicons-VERSION-windows-amd64.zip` |

          ### Quick Start
          ```bash
          tar -xzf glitchicons-VERSION-linux-amd64.tar.gz
          ./linux-amd64/glitchscan --version
          ```

          ### Platform
          - **1757 Python tests · 0 failures**
          - **37 Go binaries across 4 tiers**
          - MIT License · Authorized use only
          EOF
          sed -i "s/VERSION/$TAG/g" notes.md
          cat notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GLITCHICONS ${{ github.ref_name }}"
          body_path: notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
