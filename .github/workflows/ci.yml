# ============================================================
#  GLITCHICONS — GitHub Actions CI
#  Runs on every push & PR to main
# ============================================================

name: CI

on:
  push:
    branches: [main, develop, "v*"]
  pull_request:
    branches: [main]

jobs:

  # ── Lint & Security Scan ─────────────────────────────────
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint tools
        run: pip install ruff bandit

      - name: Ruff — code style
        run: ruff check . --output-format=github

      - name: Bandit — security issues in source
        run: bandit -r . -x .venv,tests -ll --format github

  # ── Unit Tests ───────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov responses httpretty

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            -v \
            --tb=short

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ── Docker Build Test ─────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t glitchicons:ci .

      - name: Test container starts
        run: |
          docker run --rm glitchicons:ci --help || true

  # ── Release (on tag push) ─────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [lint, test, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
