# docker-compose.yml — Glitchicons v1.4.0
#
# Services:
#   glitchicons  — main Python + Go platform
#   ollama       — local LLM server (Qwen2.5-Coder)
#
# Usage:
#   docker compose up -d ollama
#   docker compose run --rm glitchicons status
#   docker compose run --rm glitchicons cors https://target.com
#   docker compose run --rm glitchicons siege --config /app/engagement.yaml

services:

  # ── Main platform ─────────────────────────────────────
  glitchicons:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: glitchicons:1.4.0
    container_name: glitchicons
    network_mode: host          # full network access for scanning
    volumes:
      - ./findings:/app/findings
      - ./engagements:/app/engagements
      - ./wordlists:/app/wordlists
    environment:
      - OLLAMA_HOST=http://localhost:11434
      - FINDINGS_DIR=/app/findings
      - PYTHONUNBUFFERED=1
    depends_on:
      - ollama
    stdin_open: true
    tty: true
    command: status

  # ── Ollama LLM server ─────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: glitchicons-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ollama-data:
    driver: local
