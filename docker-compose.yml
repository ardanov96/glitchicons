# ============================================================
#  GLITCHICONS — docker-compose.yml
#  Services: glitchicons + ollama (local LLM)
# ============================================================

version: "3.9"

services:

  # ── Ollama: Local LLM engine ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: glitchicons-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Ollama model puller (run once) ───────────────────────
  ollama-setup:
    image: ollama/ollama:latest
    container_name: glitchicons-ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        ollama pull qwen2.5-coder:3b &&
        echo 'Model qwen2.5-coder:3b ready!'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # ── Glitchicons: Main app ────────────────────────────────
  glitchicons:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glitchicons-app
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./findings:/app/findings
      - ./engagements:/app/engagements
      - ./wordlists:/app/wordlists
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5-coder:3b
      - GLITCHICONS_OUTPUT_DIR=/app/findings
    network_mode: host   # needed for recon tools + Tor
    stdin_open: true
    tty: true
    command: status

  # ── Tor: IP masking proxy ────────────────────────────────
  tor:
    image: dperson/torproxy:latest
    container_name: glitchicons-tor
    restart: unless-stopped
    ports:
      - "9050:9050"   # SOCKS5
      - "8118:8118"   # HTTP proxy
    environment:
      - TOR_MaxCircuitDirtiness=60

volumes:
  ollama_models:
    name: glitchicons_ollama_models

networks:
  default:
    name: glitchicons_net
